{% extends "base.html" %}

{% block title %}Access Control - Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-panel">
        <div class="auth-header">
            <h1>FALCON ACCESS</h1>
            <p class="auth-subtitle">SECURE TERMINAL LOGIN</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">OPERATOR ID</label>
                <div class="input-with-icon">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">SECURE KEY</label>
                <div class="input-with-icon">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="auth-button">INITIATE SESSION</button>
        </form>

        <div class="auth-footer">
            <p>New operator? <a href="{{ url_for('auth.register') }}">Request Access</a></p>
        </div>
    </div>
</div>
{% endblock %}
